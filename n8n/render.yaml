services:
  - type: web
    name: n8n
    runtime: docker
    dockerfilePath: ./n8n/Dockerfile
    dockerContext: ./n8n
    plan: free
    envVars:
      - key: DB_TYPE
        value: postgresdb
      - key: DATABASE_URL
        value: 'postgresql://postgres.qyyoaibgniacbbalzjkz:2rEGSmWR9MC6afGb@aws-1-us-west-2.pooler.supabase.com:5432/postgres'
      - key: DB_POSTGRESDB_HOST
        value: aws-1-us-west-2.pooler.supabase.com
      - key: DB_POSTGRESDB_PORT
        value: 5432
      - key: DB_POSTGRESDB_DATABASE
        value: postgres
      - key: DB_POSTGRESDB_USER
        value: postgres.qyyoaibgniacbbalzjkz
      - key: DB_POSTGRESDB_PASSWORD
        value: 2rEGSmWR9MC6afGb
      - key: DB_POSTGRESDB_SSL_ENABLED
        value: true
      - key: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
        value: false
      - key: DB_POSTGRESDB_POOL_SIZE
        value: 1
      - key: DB_POSTGRESDB_CONNECTION_TIMEOUT
        value: 60000
      - key: DB_POSTGRESDB_IDLE_CONNECTION_TIMEOUT
        value: 10000
      - key: DB_PING_INTERVAL_SECONDS
        value: 15
      - key: DB_PING_TIMEOUT_MS
        value: 60000

      - key: N8N_PORT
        value: 5678
      - key: N8N_INTERNAL_PORT
        value: 5680
      - key: N8N_HOST
        value: n8n-e9qi.onrender.com
      - key: N8N_PROTOCOL
        value: https
      - key: N8N_EDITOR_BASE_URL
        value: https://n8n-e9qi.onrender.com
      - key: WEBHOOK_URL
        value: https://n8n-e9qi.onrender.com/
      - key: N8N_PROXY_HOPS
        value: 1
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=384
      - key: GENERIC_TIMEZONE
        value: America/Sao_Paulo
      - key: TZ
        value: America/Sao_Paulo
      - key: N8N_RUNNERS_GRANT_TOKEN_TTL
        value: 120
      - key: EXECUTIONS_DATA_SAVE_ON_SUCCESS
        value: none
      - key: EXECUTIONS_DATA_SAVE_ON_ERROR
        value: all
      - key: EXECUTIONS_DATA_SAVE_ON_PROGRESS
        value: false
      - key: EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS
        value: false
      - key: EXECUTIONS_DATA_PRUNE
        value: true
      - key: EXECUTIONS_DATA_MAX_AGE
        value: 24
      - key: EXECUTIONS_DATA_PRUNE_MAX_COUNT
        value: 200

      # IMPORTANTE: depois do primeiro deploy, coloque uma chave fixa aqui
      - key: N8N_ENCRYPTION_KEY
        generateValue: true

      - key: N8N_SECURE_COOKIE
        value: true
      - key: N8N_SAMESITE_COOKIE
        value: none
      - key: N8N_CONTENT_SECURITY_POLICY
        value: '{"default-src":["''self''"],"script-src":["''self''","''unsafe-inline''","''unsafe-eval''","data:","blob:","https://cdn-rs.n8n.io"],"script-src-elem":["''self''","''unsafe-inline''","''unsafe-eval''","data:","blob:","https://cdn-rs.n8n.io"],"style-src":["''self''","''unsafe-inline''"],"img-src":["''self''","data:","blob:"],"font-src":["''self''","data:"],"connect-src":["''self''","https:","wss:"],"worker-src":["''self''","blob:"],"frame-src":["''self''"],"frame-ancestors":["''self''","https://*.onrender.com","https://cacheaside.onrender.com","http://localhost:8080","http://127.0.0.1:8080","http://127.0.0.1:8081"]}'
      - key: N8N_PROXY_CONTENT_SECURITY_POLICY
        value: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://cdn-rs.n8n.io; script-src-elem 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://cdn-rs.n8n.io; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https: wss:; worker-src 'self' blob:; frame-src 'self'; frame-ancestors 'self' https://*.onrender.com https://cacheaside.onrender.com http://localhost:8080 http://127.0.0.1:8080 http://127.0.0.1:8081"
      - key: N8N_DISABLE_UI_SECURITY
        value: true
